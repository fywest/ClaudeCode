<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe</title>
<style>
  :root {
    --bg-a: #0f0c29;
    --bg-b: #302b63;
    --bg-c: #24243e;
    --panel: rgba(28, 28, 48, 0.55);
    --panel-border: rgba(255, 255, 255, 0.08);
    --board: rgba(255, 255, 255, 0.04);
    --cell: rgba(255, 255, 255, 0.06);
    --cell-hover: rgba(255, 255, 255, 0.12);
    --x-color: #00e5ff;
    --x-glow: rgba(0, 229, 255, 0.55);
    --o-color: #ff7ab8;
    --o-glow: rgba(255, 122, 184, 0.55);
    --win: #7effa0;
    --win-glow: rgba(126, 255, 160, 0.5);
    --text: #f2f2fb;
    --muted: #9c9cc4;
    --accent-1: #7f5af0;
    --accent-2: #2cb1ff;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at 15% 15%, rgba(127, 90, 240, 0.35), transparent 40%),
      radial-gradient(circle at 85% 25%, rgba(44, 177, 255, 0.25), transparent 45%),
      radial-gradient(circle at 50% 90%, rgba(255, 122, 184, 0.15), transparent 45%),
      linear-gradient(135deg, var(--bg-a), var(--bg-b) 50%, var(--bg-c));
    background-attachment: fixed;
    font-family: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
    color: var(--text);
    overflow-x: hidden;
  }

  .app {
    position: relative;
    background: var(--panel);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid var(--panel-border);
    border-radius: 24px;
    padding: 36px 38px;
    box-shadow: 0 25px 70px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.06);
    width: 400px;
    text-align: center;
  }

  h1 {
    margin: 0 0 4px;
    font-size: 30px;
    font-weight: 800;
    letter-spacing: 1px;
    background: linear-gradient(90deg, var(--accent-2), var(--accent-1) 55%, var(--o-color));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 22px;
    letter-spacing: 0.5px;
  }

  .scoreboard {
    display: flex;
    justify-content: space-between;
    background: var(--board);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 20px;
  }

  .score {
    flex: 1;
    padding: 6px 4px;
    border-radius: 10px;
    transition: background 0.25s, box-shadow 0.25s;
  }

  .score.active {
    background: rgba(127, 90, 240, 0.18);
    box-shadow: 0 0 0 1px rgba(127, 90, 240, 0.35), 0 0 18px rgba(127, 90, 240, 0.25);
  }

  .score .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }

  .score.x-score .value { color: var(--x-color); text-shadow: 0 0 12px var(--x-glow); }
  .score.o-score .value { color: var(--o-color); text-shadow: 0 0 12px var(--o-glow); }
  .score.draw-score .value { color: var(--muted); }

  .score .value {
    font-size: 24px;
    font-weight: 800;
    margin-top: 2px;
  }

  .status {
    margin-bottom: 20px;
    font-size: 16px;
    min-height: 24px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .status .turn-x { color: var(--x-color); text-shadow: 0 0 10px var(--x-glow); }
  .status .turn-o { color: var(--o-color); text-shadow: 0 0 10px var(--o-glow); }
  .status .win-text { color: var(--win); text-shadow: 0 0 12px var(--win-glow); }
  .status .draw-text { color: var(--muted); }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    background: var(--board);
    border: 1px solid var(--panel-border);
    padding: 12px;
    border-radius: 18px;
  }

  .cell {
    aspect-ratio: 1 / 1;
    background: var(--cell);
    border: 1px solid transparent;
    border-radius: 12px;
    font-size: 46px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text);
    transition: background 0.15s, transform 0.1s, border-color 0.15s;
  }

  .cell:hover:not(:disabled) {
    background: var(--cell-hover);
    border-color: rgba(255,255,255,0.12);
    transform: translateY(-2px);
  }

  .cell:disabled {
    cursor: default;
  }

  .cell.x { color: var(--x-color); text-shadow: 0 0 16px var(--x-glow); }
  .cell.o { color: var(--o-color); text-shadow: 0 0 16px var(--o-glow); }

  .cell.win-cell {
    background: rgba(126, 255, 160, 0.15);
    border-color: rgba(126, 255, 160, 0.4);
    color: var(--win) !important;
    text-shadow: 0 0 20px var(--win-glow) !important;
    animation: pulse 1.1s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 rgba(126, 255, 160, 0); }
    50% { box-shadow: 0 0 22px rgba(126, 255, 160, 0.45); }
  }

  .cell.pop {
    animation: pop 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes pop {
    from { transform: scale(0.5); opacity: 0.4; }
    to { transform: scale(1); opacity: 1; }
  }

  .controls {
    margin-top: 22px;
    display: flex;
    gap: 10px;
  }

  button.action {
    flex: 1;
    padding: 11px 12px;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: filter 0.15s, transform 0.05s, box-shadow 0.15s;
  }

  button.action:active {
    transform: scale(0.96);
  }

  .btn-restart {
    background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
    color: white;
    box-shadow: 0 6px 20px rgba(127, 90, 240, 0.35);
  }

  .btn-restart:hover {
    filter: brightness(1.12);
    box-shadow: 0 8px 26px rgba(127, 90, 240, 0.5);
  }

  .btn-reset {
    background: rgba(255,255,255,0.05);
    color: var(--muted);
    border: 1px solid var(--panel-border);
  }

  .btn-reset:hover {
    background: rgba(255,255,255,0.1);
    color: var(--text);
  }
</style>
</head>
<body>
  <div class="app">
    <h1>TIC · TAC · TOE</h1>
    <div class="subtitle">Two players, one board</div>

    <div class="scoreboard">
      <div class="score x-score" id="scoreX">
        <div class="label">Player X</div>
        <div class="value" id="scoreXVal">0</div>
      </div>
      <div class="score draw-score" id="scoreDraw">
        <div class="label">Draws</div>
        <div class="value" id="scoreDrawVal">0</div>
      </div>
      <div class="score o-score" id="scoreO">
        <div class="label">Player O</div>
        <div class="value" id="scoreOVal">0</div>
      </div>
    </div>

    <div class="status" id="status"></div>

    <div class="board" id="board"></div>

    <div class="controls">
      <button class="action btn-restart" id="restartBtn">Play Again</button>
      <button class="action btn-reset" id="resetBtn">Reset Scores</button>
    </div>
  </div>

<script>
  const WIN_LINES = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const restartBtn = document.getElementById('restartBtn');
  const resetBtn = document.getElementById('resetBtn');
  const scoreXVal = document.getElementById('scoreXVal');
  const scoreOVal = document.getElementById('scoreOVal');
  const scoreDrawVal = document.getElementById('scoreDrawVal');
  const scoreXEl = document.getElementById('scoreX');
  const scoreOEl = document.getElementById('scoreO');

  let cells = Array(9).fill(null);
  let currentPlayer = 'X';
  let gameOver = false;
  let scores = { X: 0, O: 0, draw: 0 };

  function renderBoard() {
    boardEl.innerHTML = '';
    cells.forEach((val, i) => {
      const btn = document.createElement('button');
      btn.className = 'cell' + (val ? ' ' + val.toLowerCase() : '');
      btn.textContent = val || '';
      btn.disabled = !!val || gameOver;
      btn.addEventListener('click', () => handleMove(i));
      boardEl.appendChild(btn);
    });
  }

  function updateStatus() {
    if (gameOver) return;
    const cls = currentPlayer === 'X' ? 'turn-x' : 'turn-o';
    statusEl.innerHTML = `Turn: <span class="${cls}">Player ${currentPlayer}</span>`;
    scoreXEl.classList.toggle('active', currentPlayer === 'X');
    scoreOEl.classList.toggle('active', currentPlayer === 'O');
  }

  function checkWinner() {
    for (const line of WIN_LINES) {
      const [a, b, c] = line;
      if (cells[a] && cells[a] === cells[b] && cells[a] === cells[c]) {
        return { player: cells[a], line };
      }
    }
    if (cells.every(c => c !== null)) {
      return { player: null, line: null, draw: true };
    }
    return null;
  }

  function handleMove(index) {
    if (cells[index] || gameOver) return;
    cells[index] = currentPlayer;
    renderBoard();

    const btn = boardEl.children[index];
    btn.classList.add('pop');

    const result = checkWinner();
    if (result) {
      gameOver = true;
      scoreXEl.classList.remove('active');
      scoreOEl.classList.remove('active');
      if (result.draw) {
        statusEl.innerHTML = `<span class="draw-text">It's a draw!</span>`;
        scores.draw++;
        scoreDrawVal.textContent = scores.draw;
      } else {
        statusEl.innerHTML = `<span class="win-text">Player ${result.player} wins!</span>`;
        result.line.forEach(i => boardEl.children[i].classList.add('win-cell'));
        scores[result.player]++;
        (result.player === 'X' ? scoreXVal : scoreOVal).textContent = scores[result.player];
      }
      disableAll();
      return;
    }

    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    updateStatus();
  }

  function disableAll() {
    [...boardEl.children].forEach(btn => btn.disabled = true);
  }

  function startNewRound() {
    cells = Array(9).fill(null);
    currentPlayer = 'X';
    gameOver = false;
    renderBoard();
    updateStatus();
  }

  function resetScores() {
    scores = { X: 0, O: 0, draw: 0 };
    scoreXVal.textContent = 0;
    scoreOVal.textContent = 0;
    scoreDrawVal.textContent = 0;
    startNewRound();
  }

  restartBtn.addEventListener('click', startNewRound);
  resetBtn.addEventListener('click', resetScores);

  startNewRound();
</script>
</body>
</html>
