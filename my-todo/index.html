<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowy Todo</title>
<style>
  :root {
    --bg-top: #eef0ff;
    --bg-bottom: #fdf1f7;
    --card-bg: #ffffff;
    --text-main: #2b2440;
    --text-sub: #8b8aa3;
    --purple: #7c6ef2;
    --purple-2: #c86edb;
    --coral: #ef5f74;
    --green: #22b07d;
    --danger: #ef5f74;
    --border: #efeef7;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
    display: flex;
    justify-content: center;
    padding: 32px 16px;
  }

  .app {
    width: 100%;
    max-width: 420px;
  }

  .header {
    text-align: center;
    margin-bottom: 20px;
  }

  .brand {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .brand-icon {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--purple), var(--purple-2));
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 18px;
    flex-shrink: 0;
  }

  .brand-title {
    font-size: 26px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--purple), var(--purple-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .subtitle {
    color: var(--text-sub);
    font-size: 13.5px;
  }

  .stats {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }

  .stat-card {
    flex: 1;
    background: var(--card-bg);
    border-radius: 16px;
    padding: 14px 8px;
    text-align: center;
    box-shadow: 0 6px 20px rgba(124, 110, 242, 0.08);
  }

  .stat-num {
    font-size: 22px;
    font-weight: 800;
  }

  .stat-num.purple { color: var(--purple); }
  .stat-num.coral { color: var(--coral); }
  .stat-num.green { color: var(--green); }

  .stat-label {
    font-size: 12px;
    color: var(--text-sub);
    margin-top: 2px;
  }

  .add-panel {
    background: var(--card-bg);
    border-radius: 18px;
    padding: 14px;
    margin-bottom: 16px;
    box-shadow: 0 6px 20px rgba(124, 110, 242, 0.08);
  }

  .input-row {
    display: flex;
    gap: 10px;
  }

  #todo-input {
    flex: 1;
    padding: 12px 16px;
    border: none;
    border-radius: 12px;
    background: #f7f6fd;
    font-size: 15px;
    outline: none;
    color: var(--text-main);
  }

  #todo-input::placeholder { color: var(--text-sub); }

  #add-btn {
    width: 44px;
    height: 44px;
    flex-shrink: 0;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--purple), var(--purple-2));
    color: #fff;
    font-size: 20px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.15s;
  }

  #add-btn:hover { opacity: 0.92; }
  #add-btn:active { transform: scale(0.95); }

  .add-options {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .tag-chip {
    border: none;
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 12.5px;
    cursor: pointer;
    background: #f2f1fa;
    color: var(--text-sub);
    transition: background 0.15s, color 0.15s;
  }

  .tag-chip[data-tag="工作"].active { background: #e5f0ff; color: #3b82f6; }
  .tag-chip[data-tag="个人"].active { background: #ffe8f1; color: #ec4899; }
  .tag-chip[data-tag="健康"].active { background: #e5f9ee; color: #16a34a; }

  #due-input {
    border: none;
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 12.5px;
    background: #f2f1fa;
    color: var(--text-sub);
    outline: none;
  }

  .filters {
    display: flex;
    gap: 4px;
    background: rgba(255, 255, 255, 0.5);
    border-radius: 14px;
    padding: 4px;
    margin-bottom: 16px;
  }

  .filter-btn {
    flex: 1;
    padding: 9px 0;
    border: none;
    border-radius: 11px;
    background: transparent;
    color: var(--text-sub);
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .filter-btn.active {
    background: #fff;
    color: var(--text-main);
    box-shadow: 0 4px 12px rgba(124, 110, 242, 0.12);
  }

  #todo-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .todo-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px;
    background: var(--card-bg);
    border-radius: 16px;
    box-shadow: 0 6px 20px rgba(124, 110, 242, 0.06);
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .todo-checkbox {
    width: 22px;
    height: 22px;
    margin-top: 2px;
    flex-shrink: 0;
    border-radius: 50%;
    border: 2px solid #d9d7ec;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    transition: background 0.15s, border-color 0.15s;
  }

  .todo-checkbox.checked {
    background: var(--purple);
    border-color: var(--purple);
  }

  .todo-checkbox.checked::after {
    content: "✓";
    color: #fff;
    font-size: 12px;
  }

  .todo-body { flex: 1; min-width: 0; }

  .todo-text {
    font-size: 15px;
    color: var(--text-main);
    font-weight: 600;
    word-break: break-word;
  }

  .todo-item.done .todo-text {
    color: var(--text-sub);
    text-decoration: line-through;
    font-weight: 500;
  }

  .todo-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
    font-size: 12px;
  }

  .tag-badge {
    border-radius: 999px;
    padding: 2px 9px;
    font-weight: 600;
  }

  .tag-badge.tag-工作 { background: #e5f0ff; color: #3b82f6; }
  .tag-badge.tag-个人 { background: #ffe8f1; color: #ec4899; }
  .tag-badge.tag-健康 { background: #e5f9ee; color: #16a34a; }
  .tag-badge.tag-done { background: #f2f1fa; color: var(--text-sub); }

  .due-text { color: var(--text-sub); }

  .delete-btn {
    border: none;
    background: transparent;
    color: var(--text-sub);
    font-size: 17px;
    cursor: pointer;
    line-height: 1;
    padding: 4px;
    border-radius: 6px;
    align-self: flex-start;
    transition: color 0.15s, background 0.15s;
  }

  .delete-btn:hover {
    color: var(--danger);
    background: rgba(239, 95, 116, 0.1);
  }

  .empty-state {
    text-align: center;
    color: var(--text-sub);
    font-size: 14px;
    padding: 32px 0;
  }

  .footer {
    text-align: center;
    margin-top: 20px;
    font-size: 12.5px;
    color: var(--text-sub);
  }

  .heart { color: #ef5f74; }
</style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="brand">
        <div class="brand-icon">✓</div>
        <div class="brand-title">Flowy Todo</div>
      </div>
      <p class="subtitle">让每一天都井井有条</p>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-num purple" id="stat-all">0</div>
        <div class="stat-label">全部任务</div>
      </div>
      <div class="stat-card">
        <div class="stat-num coral" id="stat-active">0</div>
        <div class="stat-label">进行中</div>
      </div>
      <div class="stat-card">
        <div class="stat-num green" id="stat-done">0</div>
        <div class="stat-label">已完成</div>
      </div>
    </div>

    <div class="add-panel">
      <div class="input-row">
        <input id="todo-input" type="text" placeholder="添加新任务..." maxlength="100" />
        <button id="add-btn">+</button>
      </div>
      <div class="add-options">
        <button class="tag-chip active" data-tag="个人">个人</button>
        <button class="tag-chip" data-tag="工作">工作</button>
        <button class="tag-chip" data-tag="健康">健康</button>
        <input id="due-input" type="datetime-local" />
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="active">进行中</button>
      <button class="filter-btn" data-filter="done">已完成</button>
    </div>

    <ul id="todo-list"></ul>

    <p class="footer">用<span class="heart">❤️</span>打造，让生活更美好</p>
  </div>

<script>
  const STORAGE_KEY = "todos-v2";
  const input = document.getElementById("todo-input");
  const addBtn = document.getElementById("add-btn");
  const list = document.getElementById("todo-list");
  const dueInput = document.getElementById("due-input");
  const tagChips = document.querySelectorAll(".tag-chip");
  const filterBtns = document.querySelectorAll(".filter-btn");
  const statAll = document.getElementById("stat-all");
  const statActive = document.getElementById("stat-active");
  const statDone = document.getElementById("stat-done");

  let todos = loadTodos();
  let currentFilter = "all";
  let currentTag = "个人";

  function loadTodos() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function saveTodos() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
  }

  function formatDue(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    if (isNaN(d.getTime())) return "";
    const now = new Date();
    const startOfDay = date => new Date(date.getFullYear(), date.getMonth(), date.getDate());
    const dayDiff = Math.round((startOfDay(d) - startOfDay(now)) / 86400000);

    const hours = d.getHours();
    const minutes = d.getMinutes().toString().padStart(2, "0");
    const period = hours < 12 ? "上午" : "下午";
    const hour12 = ((hours + 11) % 12) + 1;
    const timeStr = `${period}${hour12}:${minutes}`;

    if (dayDiff === 0) return `今天 · ${timeStr}`;
    if (dayDiff === 1) return `明天 · ${timeStr}`;
    if (dayDiff === -1) return `昨天 · ${timeStr}`;
    return `${d.getMonth() + 1}月${d.getDate()}日 · ${timeStr}`;
  }

  function addTodo(text) {
    const trimmed = text.trim();
    if (!trimmed) return;
    todos.unshift({
      id: Date.now(),
      text: trimmed,
      tag: currentTag,
      due: dueInput.value || "",
      done: false,
    });
    saveTodos();
    render();
  }

  function toggleTodo(id) {
    const t = todos.find(t => t.id === id);
    if (t) t.done = !t.done;
    saveTodos();
    render();
  }

  function deleteTodo(id) {
    todos = todos.filter(t => t.id !== id);
    saveTodos();
    render();
  }

  function getFiltered() {
    if (currentFilter === "active") return todos.filter(t => !t.done);
    if (currentFilter === "done") return todos.filter(t => t.done);
    return todos;
  }

  function render() {
    const filtered = getFiltered();
    list.innerHTML = "";

    if (filtered.length === 0) {
      const emptyText = todos.length === 0 ? "还没有待办事项，添加一个吧～" : "这里空空如也";
      list.innerHTML = `<li class="empty-state">${emptyText}</li>`;
    } else {
      filtered.forEach(todo => {
        const li = document.createElement("li");
        li.className = "todo-item" + (todo.done ? " done" : "");

        const checkbox = document.createElement("div");
        checkbox.className = "todo-checkbox" + (todo.done ? " checked" : "");
        checkbox.addEventListener("click", () => toggleTodo(todo.id));

        const body = document.createElement("div");
        body.className = "todo-body";

        const text = document.createElement("div");
        text.className = "todo-text";
        text.textContent = todo.text;

        const meta = document.createElement("div");
        meta.className = "todo-meta";

        const tagBadge = document.createElement("span");
        if (todo.done) {
          tagBadge.className = "tag-badge tag-done";
          tagBadge.textContent = "已完成";
          meta.appendChild(tagBadge);
        } else {
          if (todo.tag) {
            tagBadge.className = `tag-badge tag-${todo.tag}`;
            tagBadge.textContent = todo.tag;
            meta.appendChild(tagBadge);
          }
          const dueText = formatDue(todo.due);
          if (dueText) {
            const due = document.createElement("span");
            due.className = "due-text";
            due.textContent = dueText;
            meta.appendChild(due);
          }
        }

        body.appendChild(text);
        if (meta.childNodes.length > 0) body.appendChild(meta);

        const delBtn = document.createElement("button");
        delBtn.className = "delete-btn";
        delBtn.textContent = "✕";
        delBtn.addEventListener("click", () => deleteTodo(todo.id));

        li.appendChild(checkbox);
        li.appendChild(body);
        li.appendChild(delBtn);
        list.appendChild(li);
      });
    }

    statAll.textContent = todos.length;
    statActive.textContent = todos.filter(t => !t.done).length;
    statDone.textContent = todos.filter(t => t.done).length;
  }

  addBtn.addEventListener("click", () => {
    addTodo(input.value);
    input.value = "";
    dueInput.value = "";
    input.focus();
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      addTodo(input.value);
      input.value = "";
      dueInput.value = "";
    }
  });

  tagChips.forEach(chip => {
    chip.addEventListener("click", () => {
      tagChips.forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      currentTag = chip.dataset.tag;
    });
  });

  filterBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      filterBtns.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  render();
</script>
</body>
</html>
